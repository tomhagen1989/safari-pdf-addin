name: Build Safari Extension

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]
  workflow_dispatch:   # allow manual runs from the GitHub Actions UI

# Change these two values to match your app
env:
  APP_NAME:   "PDF Saver"
  BUNDLE_ID:  "com.example.pdfsaver"

# ============================================================
# Job 1 — Generate PNG icons and build the bookmarklet
#         Runs on Linux for speed; outputs the complete
#         extension/ directory as an artifact.
# ============================================================
jobs:
  prepare-extension:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate PNG icons
        run: npm run generate-icons

      - name: Build bookmarklet
        run: npm run build-bookmarklet

      - name: Upload extension directory
        uses: actions/upload-artifact@v4
        with:
          name: extension-ready
          path: extension/
          retention-days: 1

      - name: Upload bookmarklet installer
        uses: actions/upload-artifact@v4
        with:
          name: bookmarklet
          path: bookmarklet/
          retention-days: 30

# ============================================================
# Job 2 — Convert to Xcode project and build on macOS
# ============================================================
  build-xcode:
    runs-on: macos-latest
    needs: prepare-extension

    steps:
      - uses: actions/checkout@v4

      - name: Download extension artifacts
        uses: actions/download-artifact@v4
        with:
          name: extension-ready
          path: extension/

      - name: Select latest stable Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      # ── Convert web extension → Xcode project ──────────────────────
      - name: Convert extension to Xcode project
        run: |
          xcrun safari-web-extension-converter extension/ \
            --project-location ./xcode-generated \
            --app-name "$APP_NAME" \
            --bundle-identifier "$BUNDLE_ID" \
            --no-open
          echo "Generated project structure:"
          find ./xcode-generated -maxdepth 4 -type f | sort

      # ── Unsigned simulator build — validates the extension compiles ──
      # This runs even without signing secrets, so you get fast feedback
      # that the extension code is structurally correct.
      - name: Build (unsigned — simulator validation)
        run: |
          cd xcode-generated
          PROJECT=$(find . -name "*.xcodeproj" -maxdepth 2 | head -1)
          echo "Using project: $PROJECT"

          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$APP_NAME (iOS)" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
              -project "$PROJECT" \
              -scheme "$APP_NAME (iOS)" \
              -destination "generic/platform=iOS Simulator" \
              -configuration Debug \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO

      # ── Signed build — only runs when secrets are configured ────────
      - name: Check for signing secrets
        id: signing
        run: |
          if [ -n "${{ secrets.SIGNING_CERTIFICATE_P12_BASE64 }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Signing secrets found — will build signed IPA."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Signing secrets not set. Skipping signed IPA build."
            echo "::notice::See README.md — 'Code signing setup' for instructions."
          fi

      - name: Import signing certificate
        if: steps.signing.outputs.available == 'true'
        env:
          P12_B64:    ${{ secrets.SIGNING_CERTIFICATE_P12_BASE64 }}
          P12_PASS:   ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          KC_PASS:    ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/build.keychain"
          echo "$P12_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KC_PASS" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KC_PASS" "$KC"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$P12_PASS" -A -t cert -f pkcs12 -k "$KC"
          security list-keychain -d user -s "$KC"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" "$KC"

      - name: Import provisioning profile
        if: steps.signing.outputs.available == 'true'
        env:
          PP_B64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo "$PP_B64" | base64 --decode > "$PP_DIR/PDFSaver.mobileprovision"

      - name: Patch ExportOptions.plist with team ID
        if: steps.signing.outputs.available == 'true'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i '' "s/REPLACE_WITH_TEAM_ID/$TEAM_ID/g" ExportOptions.plist
          # Also patch bundle ID if it was customised
          sed -i '' "s/com.example.pdfsaver/$BUNDLE_ID/g" ExportOptions.plist

      - name: Archive
        if: steps.signing.outputs.available == 'true'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd xcode-generated
          PROJECT=$(find . -name "*.xcodeproj" -maxdepth 2 | head -1)

          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$APP_NAME (iOS)" \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/PDFSaver.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Development" \
            PROVISIONING_PROFILE_SPECIFIER="PDFSaver"

      - name: Export IPA
        if: steps.signing.outputs.available == 'true'
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/PDFSaver.xcarchive" \
            -exportPath   "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: PDFSaver-ipa
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      # Always upload the generated Xcode project so you can inspect it
      - name: Upload Xcode project
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-project
          path: xcode-generated/
          retention-days: 7
